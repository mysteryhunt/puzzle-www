<p>The 2026 MIT Sudoku Open has concluded. Check back next year!</p>

We are planning on having a couple individual competition rounds (solving on your own), as well as 1-2 team rounds (solving in teams of up to 4). So if you have friends who also like sudoku, ask them to come along! :) Otherwise, we'll likely set up channels to have all registrants meet one another prior to the contest date, where you can meet others who are attending, and form teams in that way. You do not need to have teams set right now. We will have another form closer to the date where you can submit team information (name of team, those in the team, etc.).

We're designing this contest to accommodate a wide range of different sudoku solving proficiencies. As such, you can sign up for the "beginner" division or the "experienced" division, which will factor into different placements/scoring.

If you have any questions, feel free to email us at puzzle-club-exec@mit.edu!

Schedule:

- 10:00-10:30: Individual: Classics
- 10:40-11:20: Individual: Variants Part I
- 11:30-12:15: Individual: Variants Part II
- Lunch
- 1:00-1:45: Individual: Spicy Round
- 2:00-2:45: Team Round 1
- 3:00-3:45: Team Round 2
- Awards/Wrap-Up
